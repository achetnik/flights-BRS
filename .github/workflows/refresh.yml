name: Nightly Flight Refresh

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to refresh (YYYY-MM). Leave blank for next 2 months.'
        required: false
        type: string
      destinations:
        description: 'Comma-separated IATA codes (e.g. AGP,CDG). Leave blank for all.'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Restore cache database
        uses: actions/cache/restore@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1
          restore-keys: flightcache-

      - name: Determine months to refresh
        id: months
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "months=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(date +%Y-%m)
            NEXT=$(date -d "+1 month" +%Y-%m 2>/dev/null || date -v+1m +%Y-%m)
            echo "months=${CURRENT},${NEXT}" >> $GITHUB_OUTPUT
          fi

      - name: Test primp impersonations
        run: |
          python -c "
          from primp import Client
          versions = ['chrome_99','chrome_100','chrome_104','chrome_106','chrome_108','chrome_110',
                      'chrome_116','chrome_119','chrome_120','chrome_123','chrome_124','chrome_126',
                      'chrome_127','chrome_128','chrome_129','chrome_130','chrome_131',
                      'safari_15_3','safari_15_5','safari_16','safari_16_5','safari_17_0',
                      'safari_17_2_1','safari_17_4_1','safari_17_5','safari_18','safari_ipad_18',
                      'safari_ios_16_5','safari_ios_17_2','safari_ios_17_4_1','safari_ios_18_1_1',
                      'edge_101','edge_122','edge_127','edge_131',
                      'okhttp_3_9','okhttp_3_11','okhttp_3_13','okhttp_3_14','okhttp_4_9','okhttp_4_10','okhttp_5']
          import warnings, logging
          logging.disable(logging.WARNING)
          warnings.filterwarnings('ignore')
          for v in versions:
              try:
                  c = Client(impersonate=v, verify=False)
                  r = c.get('https://httpbin.org/get', timeout=5)
                  print(f'{v}: OK')
              except Exception as e:
                  print(f'{v}: FAIL')
          "

      - name: Show database status before refresh
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database exists: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          else
            echo "No existing database — starting fresh"
          fi

      - name: Run refresh (scrapes + syncs to D1 in real-time)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          DEST_FLAG=""
          if [ -n "${{ github.event.inputs.destinations }}" ]; then
            DEST_FLAG="--destinations ${{ github.event.inputs.destinations }}"
          fi
          IFS=',' read -ra MONTHS <<< "${{ steps.months.outputs.months }}"
          for MONTH in "${MONTHS[@]}"; do
            echo "=== Refreshing ${MONTH} ==="
            python refresher.py --month "${MONTH}" ${DEST_FLAG} || true
          done

      - name: Show database status
        if: always()
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database size: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          fi

      - name: Save cache database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1-${{ github.run_id }}

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-database
          path: ~/.flightcache/flights.db
          retention-days: 90
          overwrite: true
