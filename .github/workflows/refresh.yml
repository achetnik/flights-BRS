name: Nightly Flight Refresh

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to refresh (YYYY-MM). Leave blank for next 2 months.'
        required: false
        type: string
      destinations:
        description: 'Comma-separated IATA codes (e.g. AGP,CDG). Leave blank for all.'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Restore cache database
        uses: actions/cache/restore@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1
          restore-keys: flightcache-

      - name: Determine months to refresh
        id: months
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "months=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(date +%Y-%m)
            NEXT=$(date -d "+1 month" +%Y-%m 2>/dev/null || date -v+1m +%Y-%m)
            echo "months=${CURRENT},${NEXT}" >> $GITHUB_OUTPUT
          fi

      - name: Debug - test single flight search
        run: |
          python -c "
          from google_flights import search_flights
          from config import CONSENT_COOKIES, CHROME_VERSIONS
          result = search_flights('BRS', 'AGP', '2026-04-17', cookie_str=CONSENT_COOKIES[0], chrome_version=CHROME_VERSIONS[0])
          if result:
              print(f'Total flights: {len(result.flights)}')
              for f in result.flights[:5]:
                  print(f'  name={repr(f.name)} dep={repr(f.departure)} arr={repr(f.arrival)} price={repr(f.price)} stops={repr(f.stops)}')
              no_time = sum(1 for f in result.flights if not f.departure)
              print(f'Flights without times: {no_time}/{len(result.flights)}')
          else:
              print('No result returned')

          # Also try raw fetch to see what Google returns
          from primp import Client
          from fast_flights import FlightData, Passengers
          from fast_flights.core import TFSData
          tfs = TFSData.from_interface(
              flight_data=[FlightData(date='2026-04-17', from_airport='BRS', to_airport='AGP')],
              trip='one-way', passengers=Passengers(adults=1), seat='economy',
          )
          data = tfs.as_b64()
          params = {'tfs': data.decode('utf-8'), 'hl': 'en-GB', 'tfu': 'EgQIABABIgA', 'curr': 'GBP', 'gl': 'uk'}
          client = Client(impersonate='chrome_126', verify=False)
          res = client.get('https://www.google.com/travel/flights', params=params,
                          headers={'Cookie': '${CONSENT_COOKIES[0]}', 'Accept-Language': 'en-GB,en;q=0.9'})
          print(f'HTTP status: {res.status_code}')
          print(f'Response length: {len(res.text)}')
          # Check for consent page
          if 'Before you continue' in res.text or 'consent.google' in res.text:
              print('GOT CONSENT PAGE!')
          else:
              print('No consent page - good')
          # Check for flight data markers
          if 'departure' in res.text.lower()[:10000]:
              print('Has departure text in first 10K chars')
          # Print first 500 chars
          print(f'First 500 chars: {res.text[:500]}')
          "

      - name: Show database status before refresh
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database exists: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          else
            echo "No existing database — starting fresh"
          fi

      - name: Run refresh (scrapes + syncs to D1 in real-time)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          DEST_FLAG=""
          if [ -n "${{ github.event.inputs.destinations }}" ]; then
            DEST_FLAG="--destinations ${{ github.event.inputs.destinations }}"
          fi
          IFS=',' read -ra MONTHS <<< "${{ steps.months.outputs.months }}"
          for MONTH in "${MONTHS[@]}"; do
            echo "=== Refreshing ${MONTH} ==="
            python refresher.py --month "${MONTH}" ${DEST_FLAG} || true
          done

      - name: Show database status
        if: always()
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database size: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          fi

      - name: Save cache database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1-${{ github.run_id }}

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-database
          path: ~/.flightcache/flights.db
          retention-days: 90
          overwrite: true
