name: Nightly Flight Refresh

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to refresh (YYYY-MM). Leave blank for next 2 months.'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Download previous database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: flight-database
          path: ~/.flightcache
          if_no_artifact_found: warn
          search_artifacts: true
          workflow_conclusion: ""

      - name: Determine months to refresh
        id: months
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "months=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(date +%Y-%m)
            NEXT=$(date -d "+1 month" +%Y-%m 2>/dev/null || date -v+1m +%Y-%m)
            echo "months=${CURRENT},${NEXT}" >> $GITHUB_OUTPUT
          fi

      - name: Show database status before refresh
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database exists: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          else
            echo "No existing database — starting fresh"
          fi

      - name: Run refresh
        run: |
          IFS=',' read -ra MONTHS <<< "${{ steps.months.outputs.months }}"
          for MONTH in "${MONTHS[@]}"; do
            echo "=== Refreshing ${MONTH} ==="
            python refresher.py --month "${MONTH}" || true
          done

      - name: Show database status after refresh
        if: always()
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database size: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          fi

      - name: Sync to Cloudflare D1
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: python sync_to_d1.py

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-database
          path: ~/.flightcache/flights.db
          retention-days: 90
          overwrite: true
