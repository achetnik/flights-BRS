name: Nightly Flight Refresh

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to refresh (YYYY-MM). Leave blank for next 2 months.'
        required: false
        type: string
      destinations:
        description: 'Comma-separated IATA codes (e.g. AGP,CDG). Leave blank for all.'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Restore cache database
        uses: actions/cache/restore@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1
          restore-keys: flightcache-

      - name: Determine months to refresh
        id: months
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "months=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(date +%Y-%m)
            NEXT=$(date -d "+1 month" +%Y-%m 2>/dev/null || date -v+1m +%Y-%m)
            echo "months=${CURRENT},${NEXT}" >> $GITHUB_OUTPUT
          fi

      - name: Debug primp
        run: |
          python -c "
          import primp
          print('primp version:', primp.__version__ if hasattr(primp, '__version__') else 'unknown')
          print('primp dir:', [x for x in dir(primp) if not x.startswith('_')])
          print('primp.primp dir:', [x for x in dir(primp.primp) if not x.startswith('_')])
          # Check if there's an impersonate enum or list
          import inspect
          sig = inspect.signature(primp.Client.__init__)
          print('Client.__init__ signature:', sig)
          "

      - name: Test actual Google Flights fetch
        run: |
          python -c "
          from primp import Client
          import warnings, logging
          logging.disable(logging.CRITICAL)
          warnings.filterwarnings('error')

          # Find a version that doesn't warn
          versions = ['chrome_131','chrome_130','chrome_128','chrome_126','chrome_120','chrome_116',
                      'chrome_108','chrome_104','chrome_100',
                      'safari_18','safari_17_5','safari_17_0','safari_16_5',
                      'edge_131','edge_127',
                      'Chrome131','Chrome130','Chrome128','Chrome126',
                      'chrome-131','chrome-130',
                      'CHROME_131','CHROME_130']
          for v in versions:
              warnings.resetwarnings()
              warnings.filterwarnings('error')
              try:
                  c = Client(impersonate=v, verify=False)
                  print(f'{v}: NO WARNING - works!')
              except Warning as w:
                  print(f'{v}: warned - {w}')
              except Exception as e:
                  print(f'{v}: error - {e}')
          "

      - name: Show database status before refresh
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database exists: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          else
            echo "No existing database — starting fresh"
          fi

      - name: Run refresh (scrapes + syncs to D1 in real-time)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          DEST_FLAG=""
          if [ -n "${{ github.event.inputs.destinations }}" ]; then
            DEST_FLAG="--destinations ${{ github.event.inputs.destinations }}"
          fi
          IFS=',' read -ra MONTHS <<< "${{ steps.months.outputs.months }}"
          for MONTH in "${MONTHS[@]}"; do
            echo "=== Refreshing ${MONTH} ==="
            python refresher.py --month "${MONTH}" ${DEST_FLAG} || true
          done

      - name: Show database status
        if: always()
        run: |
          if [ -f ~/.flightcache/flights.db ]; then
            echo "Database size: $(du -h ~/.flightcache/flights.db | cut -f1)"
            python -c "
          from cache_db import FlightCache
          c = FlightCache()
          s = c.get_stats()
          print(f'Searches: {s[\"searches\"]}, Flights: {s[\"flights\"]}, Routes: {s[\"routes\"]}')
          c.close()
          "
          fi

      - name: Save cache database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.flightcache
          key: flightcache-v1-${{ github.run_id }}

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-database
          path: ~/.flightcache/flights.db
          retention-days: 90
          overwrite: true
